name: build-and-push

on:
  push:
    branches:
      - 'master'

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v3
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR }}

# build and push from tag
      -
        name: Build and push from tag
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 -t ghcr.io/com30n/pasta:${{ github.ref.name }} .
          docker tag ghcr.io/com30n/pasta:${{ github.ref_name }} ghcr.io/com30n/pasta:latest
          docker push -t ghcr.io/com30n/pasta